name: Update disparity data

on:
  schedule:
    # 한국 시간(KST) 기준 평일 12:30, 16:00 실행 (UTC = KST - 9)
    - cron: "30 3 * * 1-5"
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build disparity data
        run: python scripts/build_data.py

      - name: Build MDD data
        run: python scripts/build_mdd.py

      - name: Check for changes
        id: git-check
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update disparity/MDD data"
          git push

      - name: Send Telegram notification
        if: steps.git-check.outputs.changed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify_telegram.py
